name: SonarCloud

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install gateway dependencies
        run: npm install
        working-directory: gateway

      - name: Install auth-service dependencies
        run: npm install
        working-directory: services/auth-service

      - name: Install event-service dependencies
        run: npm install
        working-directory: services/event-service

      - name: Install booking-service dependencies
        run: npm install
        working-directory: services/booking-service

      - name: Install notification-service dependencies
        run: npm install
        working-directory: services/notification-service

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
