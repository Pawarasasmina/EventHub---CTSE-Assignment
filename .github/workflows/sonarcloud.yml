name: SonarCloud

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth-service
            project_settings: sonar/auth-service.properties
          - name: event-service
            project_settings: sonar/event-service.properties
          - name: booking-service
            project_settings: sonar/booking-service.properties
          - name: notification-service
            project_settings: sonar/notification-service.properties
    name: SonarCloud / ${{ matrix.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root test dependencies
        run: npm install

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install gateway dependencies
        run: npm install
        working-directory: gateway

      - name: Install auth-service dependencies
        run: npm install
        working-directory: services/auth-service

      - name: Install event-service dependencies
        run: npm install
        working-directory: services/event-service

      - name: Install booking-service dependencies
        run: npm install
        working-directory: services/booking-service

      - name: Install notification-service dependencies
        run: npm install
        working-directory: services/notification-service

      - name: Run backend tests with coverage
        run: npm run test:coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >-
            -Dproject.settings=${{ matrix.project_settings }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
